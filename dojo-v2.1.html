<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1f14" />
  <meta name="color-scheme" content="dark" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Oferta Dojo" />
  <meta name="description" content="Calculadora comercial Dojo: tarifas 1-3, cuota mínima y comparativa." />
  <title>Calculadora Oferta Dojo</title>
  <script>
    (function () {
      function appBasePath() {
        var path = location.pathname || "/";
        if (location.hostname.endsWith(".github.io")) {
          var first = path.split("/").filter(Boolean)[0];
          if (first) return "/" + first + "/";
        }
        if (/\.[a-z0-9]+$/i.test(path.split("/").pop() || "")) {
          path = path.replace(/[^/]*$/, "");
        }
        if (path.slice(-1) !== "/") path += "/";
        return path;
      }
      window.DOJO_BASE = appBasePath();
    })();
  </script>
</head></html>
