<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Actualizando…</title>
  <style>
    body { font-family: system-ui; text-align: center; padding: 2rem; background: #0a1f14; color: #33ff66; }
    p { color: #8fc9a8; font-size: 0.9rem; }
    .spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid #1f4d32; border-top-color: #33ff66; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>Actualizando la calculadora…</h2>
  <p>Limpiando caché antigua. Un momento.</p>
  <script>
    (function () {
      function go() {
        var base = (function() {
          var path = location.pathname || "/";
          if (location.hostname.endsWith(".github.io")) {
            var first = path.split("/").filter(Boolean)[0];
            if (first) return "/" + first + "/";
          }
          return "/calculadora-dojo-mejorada/";
        })();
        location.replace(base + "dojo-v2.2.html?t=" + Date.now());
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all(regs.map(function (r) { return r.unregister(); }));
        }).then(function () {
          if ('caches' in window) {
            return caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            });
          }
        }).then(function () { setTimeout(go, 500); }).catch(function () { go(); });
      } else { go(); }
    })();
  </script>
</body>
</html>
