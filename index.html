<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1f14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Oferta Dojo" />
  <title>Calculadora Oferta Dojo</title>
  <script>
    (function () {
      function appBasePath() {
        var path = location.pathname || "/";
        if (location.hostname.endsWith(".github.io")) {
          var first = path.split("/").filter(Boolean)[0];
          if (first) return "/" + first + "/";
        }
        if (/\.[a-z0-9]+$/i.test(path.split("/").pop() || "")) {
          path = path.replace(/[^/]*$/, "");
        }
        if (path.slice(-1) !== "/") path += "/";
        return path;
      }
      var base = appBasePath();
      location.replace(base + "dojo-v2.1.html");
    })();
  </script>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
</head>
<body>
  <p><a href="dojo-v2.1.html">Abrir calculadora Dojo</a></p>
</body>
</html>
